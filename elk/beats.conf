input {
  beats {
    port => 5044
  }
}

filter {
  ################################################
  # SYSLOG
  ################################################
  if [type] == "syslog" {
    grok { match => { "message" => "%{SYSLOGLINE}" } }
    date { match => [ "timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ] }
  }

  ################################################
  # APACHE
  ################################################
  if [type] == "apache" {
    grok  { match => { "message" => "%{COMBINEDAPACHELOG}" } }
    date  { match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ] }
  }

  ################################################
  # SNORT (alert_fast.txt)
  ################################################
  if [type] == "snort" or [log][file][path] =~ /snort\/alert_fast/ or "snort" in [tags] {

    grok {
      match => {
        "message" => [
	 '^%{MONTHNUM:snort_month}/%{MONTHDAY:snort_day}-%{TIME:snort_time}(?:\.%{INT:snort_usec})? \[\*\*\] \[(?:%{NUMBER:[snort][gid]}:%{NUMBER:[snort][sid]}:%{NUMBER:[snort][rev]}|%{DATA:snort_sig})\] "%{DATA:[snort][alert]}" \[\*\*\] \[Classification: %{DATA:[snort][classification]}\] \[Priority: %{NUMBER:[snort][priority]}\] \{%{DATA:[network][transport]}\} %{IP:[source][ip]}:%{NUMBER:[source][port]} -> %{IP:[destination][ip]}:%{NUMBER:[destination][port]}$',
	'^%{MONTHNUM:snort_month}/%{MONTHDAY:snort_day}-%{TIME:snort_time}(?:\.%{INT:snort_usec})? \[\*\*\] \[(?:%{NUMBER:[snort][gid]}:%{NUMBER:[snort][sid]}:%{NUMBER:[snort][rev]}|%{DATA:snort_sig})\] "%{DATA:[snort][alert]}" \[\*\*\] \[Classification: %{DATA:[snort][classification]}\] \[Priority: %{NUMBER:[snort][priority]}\] \{%{DATA:[network][transport]}\} %{IP:[source][ip]} -> %{IP:[destination][ip]}:%{NUMBER:[destination][port]}$'
       ]
      }
      tag_on_failure => ["snort_grok_fail"]
    }

    mutate {
      add_field => {
        "[event][module]"   => "snort"
#        "[event][category]" => "intrusion_detection"
#        "[event][kind]"     => "alert"
#        "[event][severity]" => "%{[snort][priority]}"
      }
      convert => {
        "[snort][priority]"   => "integer"
        "source.port"         => "integer"
        "destination.port"    => "integer"
      }
    }
    mutate { replace => { "[event][category]" => "intrusion_detection" } }
    mutate { add_field => { "[event][kind]" => "alert" } }
    
    mutate { convert => { "[snort][sid]" => "string" } }

    translate {
      field       => "[snort][sid]"
      destination => "[attack][group]"
      exact       => true
      override    => true
      dictionary  => {
        "999901"  => "RST Hijack"
        "999902"  => "RST Hijack"
        "3000301" => "RST Hijack"
        "3000303" => "RST Hijack"

        "9911201" => "SLOWLORIS - slow header"
        "9911001" => "SLOWLORIS - slow header"
        "9911002" => "SLOWLORIS - slow header"
        "9911003" => "SLOWLORIS - slow header"

        "1009401" => "PHISH DETECT Social-Engineer"
        "1009301" => "PHISH DETECT Social-Engineer"
        "1009303" => "PHISH DETECT Social-Engineer"

        "3200003" => "TCP Hijacking Cookie reuse"
        "3990001" => "TCP Hijacking Cookie reuse"
        "3500001" => "TCP Hijacking Cookie reuse"
        "3500002" => "TCP Hijacking Cookie reuse"
        "3500003" => "TCP Hijacking Cookie reuse"

        "1300001" => "Command Injection on DVWA"

        "3002001" => "MALWARE-EXFIL JPG"
        "3002002" => "MALWARE-EXFIL JPG"
        "3002006" => "MALWARE-EXFIL JPG"
        "3120002" => "MALWARE-EXFIL JPG"
        "3120003" => "MALWARE-EXFIL JPG"
      }
      fallback => "Other"
    }

    # Nếu muốn fallback chi tiết hơn:
    if [attack][group] == "Other" and [snort][alert] {
      mutate { update => { "[attack][group]" => "%{[snort][alert]}" } }
    } 
    # Gom nhóm legend hiển thị đẹp trên Kibana
#    if [snort][sid] in ["999901","999902","3000301","3000303"] {
#      mutate { add_field => { "snort_alert_group" => "RST Hijack" } }
#    } else if [snort][sid] == "9911201,9911001","9911002","9911003" {
#      mutate { add_field => { "snort_alert_group" => "SLOWLORIS - slow header flood" } }
#    } else if [snort][sid] == "1009401,1009301,1009303" {
#      mutate { add_field => { "snort_alert_group" => "PHISH DETECT Social-Engineer Toolkit" } }
#    } else if [snort][sid] == "3200003,3990001,3500001,3500002,3500003" {
#      mutate { add_field => { "snort_alert_group" => "TCP Hijacking Cookie reuse by non-browser client" } }
#    } else if [snort][sid] == "1300001" {
#      mutate { add_field => { "snort_alert_group" => "Command Injection on DVWA" } }
#    } else if [snort][sid] == "3002001,3002002,3002006,3120002,3120003" {
#      mutate { add_field => { "snort_alert_group" => "MALWARE-EXFIL JPG"} }
#    } else {
#      mutate { add_field => { "snort_alert_group" => "%{[snort][alert]}" } }
#    }

    # Lấy timestamp từ log snort (thêm năm hiện tại, ms từ microseconds)
    ruby {
      code => '
        m = event.get("snort_month")
        d = event.get("snort_day")
        t = event.get("snort_time")
        us = event.get("snort_usec")
        if m && d && t
          m = m.to_s.rjust(2,"0")
          d = d.to_s.rjust(2,"0")
          year = Time.now.utc.year.to_s
          if t =~ /^(?<h>\d{2}:\d{2}:\d{2})(?:\.(?<f>\d+))?$/
            h = Regexp.last_match(:h)
            f = (Regexp.last_match(:f) || us || "000").to_s
            ms = (f + "000")[0,3]
            event.set("snort_ts", "#{year}-#{m}-#{d} #{h}.#{ms}")
          end
        end
      '
    }

    date {
      match  => ["snort_ts", "YYYY-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }
  } # <-- đóng khối IF SNORT
}   # <-- đóng khối FILTER

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "%{[@metadata][beat]}-%{+YYYY.MM.dd}"
  }
}

